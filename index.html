<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USTED NAV | Campus Navigation</title>
    <meta name="description" content="Find buildings, get directions and navigate USTED Kumasi campus.">
    <meta name="theme-color" content="#4338ca">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            background: #0f172a;
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }
        .splash {
            padding: 2rem;
            max-width: 360px;
            width: 100%;
        }
        .icon-ring {
            width: 90px; height: 90px;
            background: #4338ca;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.2rem;
            box-shadow: 0 0 0 16px rgba(67,56,202,.15);
            animation: pulse 2.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 12px rgba(67,56,202,.15); }
            50%      { box-shadow: 0 0 0 24px rgba(67,56,202,.05); }
        }
        h1 { font-size: 2rem; font-weight: 800; letter-spacing: -.04em; }
        .sub { font-size: .95rem; color: rgba(255,255,255,.5); margin: .5rem 0 2.5rem; }
        .campus-name {
            font-size: .75rem; font-weight: 700; letter-spacing: .1em;
            color: #818cf8; text-transform: uppercase; margin-bottom: .3rem;
        }
        .open-btn {
            display: flex; align-items: center; justify-content: center; gap: .6rem;
            width: 100%;
            padding: 1rem;
            background: #4338ca;
            color: #fff;
            text-decoration: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            transition: background .2s, transform .15s;
        }
        .open-btn:hover { background: #3730a3; transform: translateY(-2px); }
        .open-btn:active { transform: scale(.97); }
        .pills {
            display: flex; gap: .6rem; justify-content: center;
            flex-wrap: wrap; margin-top: 1.5rem;
        }
        .pill {
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 50px;
            padding: .35rem .9rem;
            font-size: .75rem;
            color: rgba(255,255,255,.55);
            display: flex; align-items: center; gap: .4rem;
        }
        .pill i { color: #818cf8; }

        .install-prompt {
            display: none;
            position: fixed;
            bottom: 1.5rem;
            left: 1rem;
            right: 1rem;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 1rem;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .install-btn {
            background: #4338ca;
            color: #fff;
            border: none;
            padding: .6rem 1.2rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .install-text {
            font-size: 0.85rem;
            text-align: left;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="splash">
        <div class="icon-ring"><img src="logo.png" alt="USTED NAV Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;"></div>
        <p class="campus-name">USTED · Kumasi Campus</p>
        <h1>USTED NAV</h1>
        <p class="sub">Search, find and get directions across campus — works offline.</p>
        <a href="map.html" class="open-btn">
            <i class="fas fa-compass"></i> Open Navigation
        </a>
        <div class="pills">
            <span class="pill"><i class="fas fa-magnifying-glass"></i> Smart Search</span>
            <span class="pill"><i class="fas fa-route"></i> Walking Routes</span>
            <span class="pill"><i class="fas fa-wifi-slash"></i> Offline Ready</span>
            <span class="pill"><i class="fas fa-location-dot"></i> GPS Locate</span>
        </div>
    </div>

    <div id="installPrompt" class="install-prompt">
        <div class="install-text">Install USTED NAV on your home screen for fast access.</div>
        <button id="installBtn" class="install-btn">Install App</button>
    </div>

    <script>
        // --- 1. SERVICE WORKER WITH AUTO-REFRESH ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    // Check for updates periodically
                    reg.update();

                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed') {
                                if (navigator.serviceWorker.controller) {
                                    // New content is available; force refresh to activate
                                    console.log('New content detected. Reloading...');
                                }
                            }
                        };
                    };
                }).catch(err => console.log('SW registration failed:', err));
            });

            // Handle controller change (occurs when a new SW takes control)
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }

        // --- 2. PWA INSTALL PROMPT ---
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installPrompt.style.display = 'flex';
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User response to install prompt: ${outcome}`);
            deferredPrompt = null;
            installPrompt.style.display = 'none';
        });

        window.addEventListener('appinstalled', () => {
            installPrompt.style.display = 'none';
            deferredPrompt = null;
            console.log('PWA was installed');
        });
    </script>
</body>
</html>
