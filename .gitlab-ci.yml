stages:
  - deploy
  - sync

pages:
  stage: deploy
  script:
    - mkdir -p public
    - find . -maxdepth 1 -not -name public -not -name .git -not -name .gitignore -exec cp -r {} public/ \;
    - rm -f public/.gitlab-ci.yml
  artifacts:
    paths:
      - public
  only:
    - main

sync_to_github:
  stage: sync
  image: alpine/git:latest
  script:
    - mkdir -p ~/.ssh
    - echo "$GITHUB_SSH_KEY" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H github.com >> ~/.ssh/known_hosts
    - git clone --mirror https://gitlab.com/kingenious-creative-dev/CampusOS.git
    - cd CampusOS.git
    - git push --mirror git@github.com:kingenious0/CampusOS.git
  only:
    - main
  when: on_success